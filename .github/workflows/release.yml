name: Release

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: tar -czf codex-spellbook.tgz AGENTS.md agents instructions task-prompts templates setup-scripts README.md CONTRIBUTING.md LICENSE
      - uses: actions/upload-artifact@v4
        with:
          name: codex-spellbook
          path: codex-spellbook.tgz
